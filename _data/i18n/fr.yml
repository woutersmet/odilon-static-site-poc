about_marker: À propos d'Odilon Creations
about_heading: "Odilon crée des finitions décoratives haut de gamme pour murs et sols. Conçues et produites avec soin et précision en Belgique."
about_caps: "Nos finitions décoratives à base minérale sont développées avec une compréhension profonde du pigment, de la composition et du mouvement de surface."

intro_eyebrow: Maison de finitions
intro_heading_pre: "La matière comme "
intro_heading_accent: "atmosphère."
intro_body: "Odilon est un atelier belge dédié à l'artisanat patient des finitions décoratives. Chaque surface est minérale, appliquée à la main et développée en dialogue étroit avec les architectes et architectes d'intérieur — pensée pour vieillir avec grâce et donner à la pièce sa juste densité."
intro_meta_founded: Fondé
intro_meta_founded_v: "Anvers, 2017"
intro_meta_origin: Origine
intro_meta_origin_v: Fabriqué en Belgique

projects_heading: PROJETS
projects_desc: "Les architectes les plus en vue d'aujourd'hui nous confient leurs projets les plus raffinés. Odilon est un témoignage du design et de l'artisanat belges, qui résonne à travers les pays et les cultures."

phil_eyebrow: Philosophie
phil_quote_pre: "« Nous travaillons avec les mains, avec patience, et avec des matériaux qui ont une "
phil_quote_em: mémoire
phil_quote_post: ". Une finition doit appartenir à la pièce — ne pas s'annoncer, mais la tenir. »"
phil_sig: "— Atelier Odilon"

proc_eyebrow: Processus
proc_heading_line1: De l'échantillon
proc_heading_line2: à la surface.
proc_lede: "Chaque commande débute à l'atelier. Nous développons des échantillons en dialogue avec vous, puis nos applicateurs installent la finition à la main sur site."
proc_s1_t: Consultation
proc_s1_d: "Nous étudions le projet, la lumière et l'architecture — et recommandons une famille de finitions à explorer."
proc_s2_t: Échantillonnage
proc_s2_d: "Des échantillons A4 et A3 sur mesure sont produits à l'atelier, affinés jusqu'à la teinte et la texture justes."
proc_s3_t: Application
proc_s3_d: "Nos applicateurs formés posent la finition sur site, couche par couche, avec le soin d'un artisan unique."
proc_s4_t: Entretien
proc_s4_d: "Nous fournissons des conseils d'entretien et restons disponibles pour les retouches."


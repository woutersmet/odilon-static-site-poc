hero_tagline: "Verfijnde afwerkingen voor muren en vloeren — ontworpen & gemaakt in België."
hero_scroll: Scroll

about_marker: Over Odilon Creations
about_heading: "Odilon creëert hoogwaardige decoratieve afwerkingen voor muren en vloeren. Ontworpen en geproduceerd met zorg en precisie in België."
about_caps: "Onze minerale decoratieve afwerkingen worden ontwikkeld vanuit een diepgaand begrip van pigment, compositie en oppervlaktebeweging."

intro_eyebrow: Huis van afwerkingen
intro_heading_pre: "Materiaal als "
intro_heading_accent: "atmosfeer."
intro_body: "Odilon is een Belgisch atelier gewijd aan het geduldige ambacht van decoratieve afwerkingen. Elk oppervlak is mineraal, met de hand aangebracht en ontwikkeld in nauw overleg met architecten en interieurontwerpers — gemaakt om met gratie te verouderen en een ruimte haar stille gewicht te geven."
intro_meta_founded: Opgericht
intro_meta_founded_v: "Antwerpen, 2017"
intro_meta_origin: Herkomst
intro_meta_origin_v: Gemaakt in België

projects_heading: PROJECTEN
projects_desc: "De meest verfijnde projecten van toonaangevende hedendaagse architecten worden ons toevertrouwd. Odilon is een getuigenis van Belgisch design en vakmanschap, dat weerklank vindt over landen en culturen heen."

phil_eyebrow: Filosofie
phil_quote_pre: "“Wij werken met de handen, met geduld, en met materialen die een "
phil_quote_em: geheugen
phil_quote_post: " hebben. Een afwerking moet bij de ruimte horen — zich niet aankondigen, maar haar dragen.”"
phil_sig: "— Atelier Odilon"

proc_eyebrow: Proces
proc_heading_line1: Van staal
proc_heading_line2: tot oppervlak.
proc_lede: "Elke opdracht begint in het atelier. We ontwikkelen stalen in dialoog met u, en onze applicateurs brengen de gekozen afwerking met de hand aan op locatie."
proc_s1_t: Consult
proc_s1_d: "We bestuderen het project, het licht en de architectuur — en bevelen een familie van afwerkingen aan om te verkennen."
proc_s2_t: Stalen
proc_s2_d: "Maatstalen op A4- en A3-formaat worden in ons atelier gemaakt en verfijnd tot tint en textuur precies kloppen."
proc_s3_t: Applicatie
proc_s3_d: "Onze opgeleide applicateurs brengen de afwerking ter plaatse aan, laag voor laag, met de zorg van één enkele maker."
proc_s4_t: Onderhoud
proc_s4_d: "We bieden onderhoudsadvies en blijven beschikbaar voor bijwerkingen wanneer het oppervlak zich settelt."


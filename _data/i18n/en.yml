projects_heading: PROJECTS
projects_desc: "We are entrusted with the most refined projects by some of today's leading architects. Odilon is a testament to Belgian design and craft, echoing across countries and cultures."

phil_eyebrow: Philosophy
phil_quote_pre: "“We work with hands, with patience, and with materials that have "
phil_quote_em: memory
phil_quote_post: ". A finish should belong to the room — not announce itself, but hold it.”"
phil_sig: "— Odilon Atelier"

proc_eyebrow: Process
proc_heading_line1: From sample
proc_heading_line2: to surface.
proc_lede: "Every commission begins in the atelier. We develop samples in dialogue with you, then bring our applicators on-site to install the chosen finish by hand."
proc_s1_t: Consultation
proc_s1_d: "We review the project, the light, and the architecture — and recommend a family of finishes to explore."
proc_s2_t: Sampling
proc_s2_d: Bespoke A4 and A3 samples are produced in our atelier, refined until the tone and texture are exactly right.
proc_s3_t: Application
proc_s3_d: "Our trained applicators install the finish on-site, layer by layer, with the care of a single maker's hand."
proc_s4_t: Aftercare
proc_s4_d: We provide care guidance and remain available for touch-ups as the surface settles into the room.


about_marker: About Odilon Creations
about_heading: "Odilon creates high-end decorative finishes for walls and floors. Designed and produced with care and precision in Belgium."
about_caps: "Our mineral-based decorative finishes are developed with a deep understanding of pigment, composition and surface movement."

intro_eyebrow: House of Finishes
intro_heading_pre: "Material as "
intro_heading_accent: "atmosphere."
intro_body: "Odilon is a Belgian atelier devoted to the slow, considered craft of decorative finishes. Each surface is mineral, hand-applied, and developed in close conversation with architects and interior designers — built to age with grace and to give a room its quiet weight."
